[server]
# Localhost only. Set to "0.0.0.0" only on a trusted network if you need
# phone/LAN access; that exposes Eva's API to every device on the network.
host = "127.0.0.1"
port = 8765

[security]
pairing_token = "eva-local"

[models]
provider = "hybrid"
ollama_url = "http://127.0.0.1:11434"
ollama_model = "qwen2.5:1.5b"
fast_model = "qwen2.5:1.5b"
deep_model = "mistral:7b"
smart_enabled = true
smart_provider = "gemini"
smart_model = "gemini-2.5-flash"

[features]
screen_capture = true
voice_enabled = false
camera_always_on = false
